[meta]
save_dir = "exp"
seed = 3407
gcpsd = true

[finetune]
finetune = false
avg_ckpt_num = 1
#ckpt_dir = "/mnt/matylda3/ihan/project/diarization/huggingface_hub/diarizen-wavlm-base-s80-md/pytorch_model.bin"
#ckpt_dir = "/scratch/hpc-prf-nt2/deegen/merlin/wavlm_pruned/diarizen-wavlm-base-s80-md/pytorch_model.bin"  # nocuta2
ckpt_dir = "/net/vol/deegen/models/diarizen-wavlm-base-s80-md/pytorch_model.bin"  # nt

[trainer]
path = "trainer_dual_opt.Trainer"
[trainer.args]
max_epochs = 100
gradient_percentile = 90
gradient_history_size = 1000
save_max_score = false
save_ckpt_interval = 1
max_patience = 10
max_num_checkpoints = 100
gradient_accumulation_steps = 2 # TODO: test if this really increases the gradient accumulation, what is one step for him?
validation_interval = 1
freeze_wavlm = false
lr_decay = false
use_one_cycle_lr = false
validation_before_training = false # true       # activate validation activate validation activate validation activate validation
preheat_epochs = 0
#compute_second_der = false

[optimizer_small]
path = "torch.optim.AdamW"
[optimizer_small.args]
lr = 2e-5

[optimizer_big]
path = "torch.optim.AdamW"
[optimizer_big.args]
lr = 1e-3

[model]
path = "diarizen.models.eend.model_wavlm_conformer_gcc_solo.Model"
[model.args]
ffn = 1024
num_layer_aux = 5
max_num_spk = 4
sin_cos = true
attention_in_aux = 216 # 2*513 + 0 0 für /4
attention_in = 256
ffn_hidden = 1024
num_head = 4
num_layer = 4
dropout = 0.1
chunk_size = 8
use_posi = false
output_activate_function = false
max_speakers_per_chunk = 4
selected_channel = 0

[train_dataset]
#path = "dataset.DiarizationDataset"
path = "dataset_lazy.DiarizationLazy"
[train_dataset.args]
#load_gcc_dir = "/mnt/scratch/tmp/qdeegen/AMI_AIS_ALI_NSF_CHiME7/data/gccs/standard_gcc/"  #  false  #
load_gcc_dir = "/mnt/scratch/tmp/qdeegen/AMI_AIS_ALI_NSF_CHiME7/data/gccs/gcc_size4096_shift311_no_freq_filt/"  #  false  #
gcpsd = true
subset = "train"  # "train"  # "dev"
scp_file = "data_no_chime/train/wav.scp"
rttm_file = "data_no_chime/train/rttm"
uem_file = "data_no_chime/train/all.uem"
chunk_size = 8
chunk_shift = 6
sample_rate = 16000
channel_mode = "multichannel"
#segment_size = 300  # 600 =10 min performed best
#debug = true

[train_dataset.dataloader]
batch_size = 32
num_workers = 2  # increase data loaders for gcc computation? instead maybe more prefatch
drop_last = true
pin_memory = true
prefetch_factor = 1 # 3 worker vtl testen oder so? jetzt grade ~1,5s pro iteration

[validate_dataset]
path = "dataset_lazy.DiarizationLazy"
#path = "dataset.DiarizationDataset"
[validate_dataset.args]
#load_gcc_dir = "/mnt/scratch/tmp/qdeegen/AMI_AIS_ALI_NSF_CHiME7/data/gccs/standard_gcc/"
load_gcc_dir = "/mnt/scratch/tmp/qdeegen/AMI_AIS_ALI_NSF_CHiME7/data/gccs/gcc_size4096_shift311_no_freq_filt/"  #  false  #
gcpsd = true
subset = "dev"  # "train"  # "dev"
scp_file = "data_no_chime/dev/wav.scp"
rttm_file = "data_no_chime/dev/rttm"
uem_file = "data_no_chime/dev/all.uem"
chunk_size = 8
chunk_shift = 8
sample_rate = 16000
channel_mode = "multichannel"
#segment_size = 1200  # 20 min

[validate_dataset.dataloader]
batch_size = 32
num_workers = 2
drop_last = true
pin_memory = true
prefetch_factor = 1

