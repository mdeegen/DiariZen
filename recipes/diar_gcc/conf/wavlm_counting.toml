[meta]
save_dir = "exp"
seed = 3407
gcpsd = false

[finetune]
finetune = false
avg_ckpt_num = 1

[trainer]
path = "trainer_dual_opt.Trainer"
[trainer.args]
spk_count_loss = true
max_epochs = 100
gradient_percentile = 90
gradient_history_size = 1000
save_max_score = false
save_ckpt_interval = 1
max_patience = 10
max_num_checkpoints = 100
gradient_accumulation_steps = 1
validation_interval = 1
freeze_wavlm = false
lr_decay = false
use_one_cycle_lr = false
validation_before_training = true # true       # activate validation activate validation activate validation activate validation
preheat_epochs = 0

[optimizer_small]
path = "torch.optim.AdamW"
[optimizer_small.args]
lr = 2e-5

[optimizer_big]
path = "torch.optim.AdamW"
[optimizer_big.args]
lr = 1e-3

[model]
path = "diarizen.models.wavlm.wavlm_counting.Model"
[model.args]
#model_path = "/scratch/hpc-prf-nt2/deegen/models/wavlm_base_plus"
chunk_size = 8
max_speakers_per_chunk = 3
selected_channel = 0

[train_dataset]
path = "dataset_lazy.DiarizationLazy"
[train_dataset.args]
gcpsd = true
subset = "train"  # "train"  # "dev"
scp_file = "data_no_chime/train/wav.scp"
rttm_file = "data_no_chime/train/rttm"
uem_file = "data_no_chime/train/all.uem"
chunk_size = 8
chunk_shift = 6
sample_rate = 16000
channel_mode = "multichannel"

[train_dataset.dataloader]
batch_size = 64
num_workers = 3  # increase data loaders for gcc computation? instead maybe more prefatch
drop_last = true
pin_memory = true
prefetch_factor = 3

[validate_dataset]
path = "dataset_lazy.DiarizationLazy"
[validate_dataset.args]
gcpsd = true
subset = "dev"  # "train"  # "dev"
scp_file = "data_no_chime/dev/wav.scp"
rttm_file = "data_no_chime/dev/rttm"
uem_file = "data_no_chime/dev/all.uem"
chunk_size = 8
chunk_shift = 8
sample_rate = 16000
channel_mode = "multichannel"

[validate_dataset.dataloader]
batch_size = 64
num_workers = 3
drop_last = true
pin_memory = true
prefetch_factor = 3

