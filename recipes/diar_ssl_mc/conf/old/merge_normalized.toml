[meta]
save_dir = "exp"
seed = 3407

[finetune]
finetune = true 
avg_ckpt_num = 1
ckpt_dir = "/mnt/matylda3/ihan/project/diarization/huggingface_hub/diarizen-wavlm-base-s80-md/pytorch_model.bin"

[trainer]
path = "trainer_dual_opt.Trainer"
[trainer.args]
max_epochs = 100
gradient_percentile = 90
gradient_history_size = 1000
save_max_score = false
save_ckpt_interval = 1
max_patience = 10
max_num_checkpoints = 100
gradient_accumulation_steps = 1
validation_interval = 1
freeze_wavlm = false
lr_decay = false
use_one_cycle_lr = false
validation_before_training = true # true       # activate validation activate validation activate validation activate validation
preheat_epochs = 0

[optimizer_small]
path = "torch.optim.AdamW"
[optimizer_small.args]
lr = 2e-5

[optimizer_big]
path = "torch.optim.AdamW"
[optimizer_big.args]
lr = 1e-3

[model]
path = "diarizen.models.eend.model_wavlm_conformer_mc.Model" # "model_mc_channel_att.Model" # only change here to my model
[model.args]
wavlm_src = "wavlm_base_s80_md"
wavlm_layer_num = 13
wavlm_feat_dim = 768
attention_in = 256
ffn_hidden = 1024
num_head = 4
num_layer = 4
dropout = 0.1
chunk_size = 8
use_posi = false
output_activate_function = false
max_speakers_per_chunk = 4
selected_channel = 0
multichannel_processing = true

[train_dataset]
path = "dataset.DiarizationDataset"
[train_dataset.args]
load_gcc_dir = "/mnt/scratch/tmp/qdeegen/AMI_AIS_ALI_NSF_CHiME7/data/gccs/standard_gcc/"  #  false  #
subset = "train"  # "train"  # "dev"
scp_file = "data_mc/train/wav.scp"
rttm_file = "data_mc/train/rttm"
uem_file = "data_mc/train/all.uem"
chunk_size = 8
chunk_shift = 6
sample_rate = 16000
channel_mode = "multichannel"

[train_dataset.dataloader]
batch_size = 16
num_workers = 1  # increase data loaders for gcc computation? instead maybe more prefatch
drop_last = true
pin_memory = true
prefetch_factor = 5

[validate_dataset]
path = "dataset.DiarizationDataset"
[validate_dataset.args]
load_gcc_dir = "/mnt/scratch/tmp/qdeegen/AMI_AIS_ALI_NSF_CHiME7/data/gccs/standard_gcc/"
subset = "dev"  # "train"  # "dev"
scp_file = "data_mc/dev/wav.scp"
rttm_file = "data_mc/dev/rttm"
uem_file = "data_mc/dev/all.uem"
chunk_size = 8
chunk_shift = 8
sample_rate = 16000
channel_mode = "multichannel"

[validate_dataset.dataloader]
batch_size = 16
num_workers = 1
drop_last = true
pin_memory = true
prefetch_factor = 5

