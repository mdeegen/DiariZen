[meta]
save_dir = "exp"
seed = 3407
gcpsd = false

[finetune]
finetune = true
avg_ckpt_num = 1
# Not csd = true # analog zu dairzen + spatial gehalen, da wurde auch das ganze model geladen
ckpt_dir = "/scratch/hpc-prf-nt2/deegen/merlin/wavlm_pruned/diarizen-wavlm-base-s80-md/pytorch_model.bin"
load_der_encoder = "/scratch/hpc-prf-nt2/deegen/deploy/forschung/DiariZen/recipes/diar_gcc/exp/wavlm_counting_pruned_att/checkpoints/epoch_0015/pytorch_model.bin"
### BEST CKP IST BEST LOSS !!!!
# TODO: Load both use same wavlm instead of each has their own?? now tiwce the wavlm is loaded and computed
# TODO Wavlm beide und weigthed sum einzelN?
[trainer]
path = "trainer_dual_opt.Trainer"
[trainer.args]
spk_count_loss = false
only_waveforms = true
num_spk = false
noisy_labels = false
max_epochs = 100
gradient_percentile = 90
gradient_history_size = 1000
save_max_score = false
save_ckpt_interval = 1
max_patience = 15
max_num_checkpoints = 100
gradient_accumulation_steps = 1
validation_interval = 1
freeze_wavlm = false
lr_decay = false
use_one_cycle_lr = false
validation_before_training = true # true       # activate validation activate validation activate validation activate validation
preheat_epochs = 0

[optimizer_small]
path = "torch.optim.AdamW"
[optimizer_small.args]
lr = 2e-5

[optimizer_big]
path = "torch.optim.AdamW"
[optimizer_big.args]
lr = 1e-3


#'wavlm.feature_extractor.conv_layers.0.layer_norm.weight'
#'wavlm.feature_extractor.conv_layers.0.layer_norm.weight'

[model]
path = "diarizen.models.eend.model_csd_film.Model"
[model.args]
#model_path = "/scratch/hpc-prf-nt2/deegen/models/wavlm_base_plus"
#pruned_model_path = true
max_speakers_per_frame = 3
# TODO: Spk count model mit 4 oder mehr trainieren und hier eingeben?
ffn = 1024
film_dim = 1
film = true
film_layers = true  #  conf mit layers amchen
num_layer_aux = 5
max_num_spk = 4
sin_cos = true
#median = "max"
attention_in_aux = 216 # 2*513 + 0 0 für /4
wavlm_src = "wavlm_base_s80_md"
wavlm_layer_num = 13
wavlm_feat_dim = 768
attention_in = 256
ffn_hidden = 1024
num_head = 4
num_layer = 4
dropout = 0.1
chunk_size = 8
use_posi = false
output_activate_function = false
max_speakers_per_chunk = 4
selected_channel = 0

[train_dataset]
path = "dataset_lazy.DiarizationLazy"
[train_dataset.args]
gcpsd = true
only_wav = true
subset = "train"  # "train"  # "dev"
scp_file = "data_no_chime/train/wav.scp"
rttm_file = "data_no_chime/train/rttm"
uem_file = "data_no_chime/train/all.uem"
chunk_size = 8
chunk_shift = 6
sample_rate = 16000
channel_mode = "multichannel"

[train_dataset.dataloader]
batch_size = 16
num_workers = 3  # increase data loaders for gcc computation? instead maybe more prefatch
drop_last = true
pin_memory = true
prefetch_factor = 3

[validate_dataset]
path = "dataset_lazy.DiarizationLazy"
[validate_dataset.args]
gcpsd = true
only_wav = true
subset = "dev"  # "train"  # "dev"
scp_file = "data_no_chime/dev/wav.scp"
rttm_file = "data_no_chime/dev/rttm"
uem_file = "data_no_chime/dev/all.uem"
chunk_size = 8
chunk_shift = 8
sample_rate = 16000
channel_mode = "multichannel"

[validate_dataset.dataloader]
batch_size = 16
num_workers = 3
drop_last = true
pin_memory = true
prefetch_factor = 3

