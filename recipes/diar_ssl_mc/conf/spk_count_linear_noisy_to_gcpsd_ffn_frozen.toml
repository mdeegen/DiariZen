[meta]
save_dir = "exp"
seed = 3407
gcpsd = true

[finetune]
finetune = true
avg_ckpt_num = 1
chkp_dir_clean_labels = "/mnt/matylda5/qdeegen/deploy/forschung/DiariZen/recipes/diar_ssl_mc/exp/spk_count_linear_noisy_labels/checkpoints/best/pytorch_model.bin"
#ckpt_dir = "/mnt/matylda3/ihan/project/diarization/huggingface_hub/diarizen-wavlm-base-s80-md/pytorch_model.bin"
#load_wavlm_only = false
load_spk_counting = "/mnt/matylda5/qdeegen/deploy/forschung/DiariZen/recipes/diar_gcc/exp/gcpsd_encoder_1024_wof_new_fly_ffn/checkpoints/best/pytorch_model.bin"

[trainer]
path = "trainer_dual_opt.Trainer"
[trainer.args]
num_spk = false
noisy_labels = false
max_epochs = 100
gradient_percentile = 90
gradient_history_size = 1000
save_max_score = false
save_ckpt_interval = 1
max_patience = 15
max_num_checkpoints = 100
gradient_accumulation_steps = 1
validation_interval = 1
freeze_wavlm = false
lr_decay = false
use_one_cycle_lr = false
validation_before_training = false # true       # activate validation activate validation activate validation activate validation
preheat_epochs = 0

[optimizer_small]
path = "torch.optim.AdamW"
[optimizer_small.args]
lr = 2e-5
#lr = 1e-5

[optimizer_big]
path = "torch.optim.AdamW"
[optimizer_big.args]
lr = 1e-3
#lr = 5e-4

[model]
path = "diarizen.models.eend.model_spk_count_linear_gcc_median_filt.Model"
[model.args]
ffn = 1024
num_layer_aux = 3
max_num_spk = 4
sin_cos = true
attention_in_aux = 216 # 2*513 + 0 0 für /4
wavlm_src = "wavlm_base_s80_md"
wavlm_layer_num = 13
wavlm_feat_dim = 768
attention_in = 256
ffn_hidden = 1024
num_head = 4
num_layer = 4
dropout = 0.1
chunk_size = 8
use_posi = false
output_activate_function = false
max_speakers_per_chunk = 4
selected_channel = 0

[train_dataset]
path = "dataset.DiarizationDataset"
[train_dataset.args]
load_gcc_dir = "/mnt/scratch/tmp/qdeegen/AMI_AIS_ALI_NSF_CHiME7/data/gccs/gcpsd_1024_new/"  #  false  #
gcpsd = true
subset = "train"  # "train"  # "dev"
scp_file = "data_no_chime/train/wav.scp"
rttm_file = "data_no_chime/train/rttm"
uem_file = "data_no_chime/train/all.uem"
chunk_size = 8
chunk_shift = 6
sample_rate = 16000
channel_mode = "multichannel"
num_spk = true   # does this still do anything?

[train_dataset.dataloader]
batch_size = 16
num_workers = 1
drop_last = true
pin_memory = true
prefetch_factor = 20

[validate_dataset]
path = "dataset.DiarizationDataset"
[validate_dataset.args]
load_gcc_dir = "/mnt/scratch/tmp/qdeegen/AMI_AIS_ALI_NSF_CHiME7/data/gccs/gcpsd_1024_new/"  #  false  #
gcpsd = true
subset = "dev"  # "train"  # "dev"
scp_file = "data_no_chime/dev/wav.scp"
rttm_file = "data_no_chime/dev/rttm"
uem_file = "data_no_chime/dev/all.uem"
chunk_size = 8
chunk_shift = 8
sample_rate = 16000
channel_mode = "multichannel"
num_spk = true

[validate_dataset.dataloader]
batch_size = 16
num_workers = 1
drop_last = true
pin_memory = true
prefetch_factor = 20
